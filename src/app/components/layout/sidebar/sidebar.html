<div class="w-64 bg-white/80 backdrop-blur-xl border-r border-gray-200 h-full p-5 flex flex-col">

  <!-- Logo / Title -->
  <div class="flex items-center gap-2 mb-8">
    <div class="w-8 h-8 flex items-center justify-center rounded-lg bg-blue-100 text-blue-600 font-bold">
      ₹
    </div>
    <h2 class="text-lg font-semibold text-gray-700">Finance</h2>
  </div>

  <!-- Navigation -->
  <nav class="space-y-2">

    <!-- Dashboard -->
    <a
      routerLink="/"
      routerLinkActive="bg-blue-50 text-blue-600 shadow-sm"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-all duration-200"
    >
      <span class="text-lg">🏠</span>
      <span class="text-sm font-medium">Dashboard</span>
    </a>

    <!-- Transactions -->
    <a
      routerLink="/transactions"
      routerLinkActive="bg-blue-50 text-blue-600 shadow-sm"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-all duration-200"
    >
      <span class="text-lg">💳</span>
      <span class="text-sm font-medium">Transactions</span>
    </a>

  </nav>

  <!-- Bottom hint (optional but premium feel) -->
  <div class="mt-auto text-xs text-gray-400 pt-6">
    Manage your finances 💼
  </div>

</div>
